# ──────────────────────────────────────────────────────────────────
# phantom-daemon  ·  Development Compose
# ──────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose-dev.yml up -d
#   docker compose -f docker-compose-dev.yml logs -f
#
# Postman / curl:
#   http://localhost:9080/api/core/hello
#
# Auth service proxy:
#   http://localhost:8443/auth/login
#   http://localhost:8443/api/core/hello (JWT required)
#
# gateway (socat) UDS → TCP wrapper:
#   daemon.sock ← socat → :9080
# ──────────────────────────────────────────────────────────────────

services:
  daemon:
    build:
      context: .
      dockerfile: dev.Dockerfile
    container_name: phantom-daemon-dev
    restart: unless-stopped
    command: ["python", "-m", "phantom_daemon.main", "/var/run/phantom/daemon.sock"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    ports:
      - "51820:51820/udp"
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - phantom-sock:/var/run/phantom
      - ./phantom_daemon:/app/phantom_daemon:ro
      - ./tests:/app/tests:ro
      - ./e2e_tests:/app/e2e_tests:ro
      - ./pytest.ini:/app/pytest.ini:ro
      - ./container-data/db:/var/lib/phantom/db
      - ./container-data/state/db:/var/lib/phantom/state/db
    secrets:
      - wg_private_key
      - wg_public_key
    environment:
      - PYTHONUNBUFFERED=1
      - PHANTOM_DB_DIR=/var/lib/phantom/db
      - PHANTOM_STATE_DIR=/var/lib/phantom/state/db
      - WIREGUARD_LISTEN_PORT=51820
      - WIREGUARD_MTU=1420
      - WIREGUARD_ENDPOINT_V4=
      - WIREGUARD_ENDPOINT_V6=

  gateway:
    image: alpine/socat:latest
    container_name: phantom-gateway
    restart: unless-stopped
    depends_on:
      - daemon
    command: TCP-LISTEN:9080,fork,reuseaddr UNIX-CONNECT:/var/run/phantom/daemon.sock
    ports:
      - "9080:9080"
    volumes:
      - phantom-sock:/var/run/phantom

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: phantom-auth-dev
    restart: unless-stopped
    depends_on:
      - daemon
    volumes:
      - phantom-sock:/var/run/phantom
      - ./services/auth-service/auth_service:/app/auth_service:ro
      - ./container-data/auth-db:/var/lib/phantom/auth
    secrets:
      - auth_signing_key
      - auth_verify_key
    environment:
      - AUTH_PROXY_URL=unix:///var/run/phantom/daemon.sock
      - AUTH_INACTIVITY_TIMEOUT=1800
    ports:
      - "8443:8443"

  nginx:
    image: nginx:alpine
    container_name: phantom-nginx-dev
    restart: unless-stopped
    depends_on:
      - auth-service
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/react-spa/dist:/usr/share/nginx/html:ro
    secrets:
      - tls_cert
      - tls_key
    ports:
      - "443:443"

secrets:
  wg_private_key:
    file: ./container-data/secrets/development/wg_private_key
  wg_public_key:
    file: ./container-data/secrets/development/wg_public_key
  auth_signing_key:
    file: ./container-data/secrets/development/auth_signing_key
  auth_verify_key:
    file: ./container-data/secrets/development/auth_verify_key
  tls_cert:
    file: ./container-data/secrets/development/tls_cert
  tls_key:
    file: ./container-data/secrets/development/tls_key

volumes:
  phantom-sock:
