name: Phantom-WG-MacOS
options:
  bundleIdPrefix: com.remrearas
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  # Restore the manually-maintained Run scheme after every regen.
  # xcodegen 2.x cannot express `<PathRunnable>` in the spec, so the
  # canonical scheme XML lives at `Tools/Phantom-WG-MacOS.xcscheme`
  # and gets copied into the Xcode project here.
  #
  # The scheme references targets via `BlueprintIdentifier` UUIDs
  # that xcodegen produces deterministically from each target's
  # name. Renaming a target invalidates the corresponding UUID in
  # the template; pull the fresh values with:
  #   grep -B1 "isa = PBXNativeTarget;" \
  #     Phantom-WG-MacOS.xcodeproj/project.pbxproj | grep '/\*'
  # and update `Tools/Phantom-WG-MacOS.xcscheme` to match.
  postGenCommand: mkdir -p Phantom-WG-MacOS.xcodeproj/xcshareddata/xcschemes && cp Tools/Phantom-WG-MacOS.xcscheme Phantom-WG-MacOS.xcodeproj/xcshareddata/xcschemes/Phantom-WG-MacOS.xcscheme

packages:
  WireGuardKit:
    path: Libraries/WireGuardKit

# Scheme is manually maintained at
# `Phantom-WG-MacOS.xcodeproj/xcshareddata/xcschemes/Phantom-WG-MacOS.xcscheme`
# so the Run action can use a `PathRunnable` pointing at the
# `/Applications/Phantom-WG Mac.app` copy refreshed by the Debug
# postBuild script. xcodegen 2.x doesn't expose `PathRunnable` in
# the YAML schema, so leaving `schemes:` undefined keeps xcodegen
# from regenerating (and clobbering) the file on every run.

targets:

  # ── Main App ──────────────────────────────────────────────

  Phantom-WG-MacOS:
    type: application
    platform: macOS
    sources:
      - path: Phantom-WG-MacOS
        excludes:
          - "**/.DS_Store"
          - Localization/translations
      - path: Phantom-WG-MacOS/Localization/translations
        type: folder
        buildPhase: resources
    dependencies:
      - target: PhantomTunnel
        embed: true
        codeSign: true
      - target: PhantomSplitTunnel
        embed: true
        codeSign: true
      - target: PhantomDNSProxy
        embed: true
        codeSign: true
      - framework: Libraries/WstunnelKit/libwstunnel_mac.a
        embed: false
    settings:
      base:
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: YES
        PRODUCT_NAME: Phantom-WG Mac
        PRODUCT_BUNDLE_IDENTIFIER: com.remrearas.Phantom-WG-MacOS
        INFOPLIST_FILE: Phantom-WG-MacOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: Phantom-WG-MacOS/Phantom-WG-MacOS.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: 9C5SL5H7CM
        SWIFT_OBJC_BRIDGING_HEADER: Phantom-WG-MacOS/BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Libraries/WstunnelKit/include"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Libraries/WstunnelKit"
        OTHER_LDFLAGS:
          - "-lresolv"
          - "-Wl,-w"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: Phantom-WG Mac DeveloperID
      configs:
        Debug:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    postBuildScripts:
      - name: Copy to Applications (Debug)
        script: |
          if [ "${CONFIGURATION}" = "Debug" ]; then
            rm -rf "/Applications/${PRODUCT_NAME}.app"
            cp -R "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app" "/Applications/${PRODUCT_NAME}.app"
          fi
        basedOnDependencyAnalysis: false
    info:
      path: Phantom-WG-MacOS/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Phantom-WG Mac
        NSSystemExtensionUsageDescription: "Phantom-WG Mac needs to install a system extension to provide VPN tunnel functionality."
    entitlements:
      path: Phantom-WG-MacOS/Phantom-WG-MacOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        # Two app-groups: the conventional `group.<id>` shared
        # container, plus the TeamID-prefixed wildcard `9C5SL5H7CM.*`
        # that authorizes this sandboxed app to look up Mach services
        # whose name starts with the team identifier — needed for
        # `NSXPCConnection` to the DNSProxy sysex's daemon (registered
        # as `9C5SL5H7CM.com.remrearas.Phantom-WG-MacOS.PhantomDNSProxy`).
        com.apple.security.application-groups:
          - group.com.remrearas.phantom-wg-macos
          - 9C5SL5H7CM.*
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider-systemextension
          - app-proxy-provider-systemextension
          - dns-proxy-systemextension
        com.apple.developer.system-extension.install: true

  # ── Network Extension (System Extension) ─────────────────

  PhantomTunnel:
    type: system-extension
    platform: macOS
    sources:
      - path: PhantomTunnel
        excludes:
          - "**/.DS_Store"
      # App↔extension shared interface — config models, persistence
      # bridge, group ID, wstunnel bridge.
      - path: Phantom-WG-MacOS/Domain/Configuration/TunnelConfig.swift
      - path: Phantom-WG-MacOS/Domain/Configuration/ConfigTypes.swift
      - path: Phantom-WG-MacOS/Domain/Configuration/SplitTunnelingConfiguration.swift
      - path: Phantom-WG-MacOS/Infrastructure/Persistence/NETunnelProviderProtocol+Config.swift
      - path: Phantom-WG-MacOS/Shared/SharedConstants.swift
      - path: Phantom-WG-MacOS/Shared/WstunnelBridge.swift
      # Extension-only shared domain — flow matching engine.
      - path: Extensions/Domain/Matching/FlowDecisionEngine.swift
    dependencies:
      - package: WireGuardKit
        product: WireGuardKit
      - framework: Libraries/WstunnelKit/libwstunnel_mac.a
        embed: false
      - sdk: NetworkExtension.framework
    preBuildScripts:
      - name: Build WireGuard Go Bridge
        script: |
          set -eo pipefail
          if [ -d "/opt/homebrew/opt/go@1.25/libexec" ]; then
            export GOROOT="/opt/homebrew/opt/go@1.25/libexec"
          elif command -v go >/dev/null 2>&1; then
            export GOROOT="$(go env GOROOT)"
          fi
          export PATH="${GOROOT:-}/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "${PROJECT_DIR}/Libraries/WireGuardKit/Sources/WireGuardKitGo"
          make
        basedOnDependencyAnalysis: false
    settings:
      base:
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        PRODUCT_NAME: com.remrearas.Phantom-WG-MacOS.PhantomTunnel
        PRODUCT_MODULE_NAME: PhantomTunnel
        PRODUCT_BUNDLE_IDENTIFIER: com.remrearas.Phantom-WG-MacOS.PhantomTunnel
        INFOPLIST_FILE: PhantomTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhantomTunnel/PhantomTunnel.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: 9C5SL5H7CM
        PROVISIONING_PROFILE_SPECIFIER: Phantom-WG Mac Tunnel DeveloperID
        SWIFT_OBJC_BRIDGING_HEADER: PhantomTunnel/BridgingHeader.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Libraries/WstunnelKit/include"
        OTHER_LDFLAGS:
          - "-lresolv"
          - "-lwstunnel_mac"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: 1
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/Libraries/WstunnelKit"
          - "$(PROJECT_DIR)/Libraries/WireGuardKit/Sources/WireGuardKitGo/out"
          - "$(CONFIGURATION_BUILD_DIR)"
    info:
      path: PhantomTunnel/Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PhantomTunnel
        NSSystemExtensionUsageDescription: "Phantom-WG Mac needs to install a system extension to provide VPN tunnel functionality."
        NetworkExtension:
          NEProviderClasses:
            com.apple.networkextension.packet-tunnel: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PhantomTunnel/PhantomTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider-systemextension
        com.apple.security.app-sandbox: true
        # Wildcard claim mirrors the main app and the DNSProxy
        # sibling — Apple validates entitlement consistency across
        # an app's embedded sysex bundles, so all three must claim
        # the same group set the embedded provisioning profile
        # authorizes.
        com.apple.security.application-groups:
          - group.com.remrearas.phantom-wg-macos
          - 9C5SL5H7CM.*
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  # ── Split-Tunneling Extension (System Extension) ─────────

  PhantomSplitTunnel:
    type: system-extension
    platform: macOS
    sources:
      - path: PhantomSplitTunnel
        excludes:
          - "**/.DS_Store"
      # App↔extension shared interface — model + Mach service
      # contract + group ID. Lives under the App tree because it
      # crosses the App/extension boundary.
      - path: Phantom-WG-MacOS/Domain/Configuration/SplitTunnelingConfiguration.swift
      - path: Phantom-WG-MacOS/Domain/IPC/DNSProxyDaemonProtocol.swift
      - path: Phantom-WG-MacOS/Shared/SharedConstants.swift
      # Extension-only shared domain — ring-buffer logger, matching
      # engine, interface watcher.
      - path: Extensions/Domain/Logging/RingBufferLogger.swift
      - path: Extensions/Domain/Matching/FlowDecisionEngine.swift
      - path: Extensions/Domain/Networking/InterfaceMonitor.swift
    dependencies:
      - sdk: NetworkExtension.framework
    settings:
      base:
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        PRODUCT_NAME: com.remrearas.Phantom-WG-MacOS.PhantomSplitTunnel
        PRODUCT_MODULE_NAME: PhantomSplitTunnel
        PRODUCT_BUNDLE_IDENTIFIER: com.remrearas.Phantom-WG-MacOS.PhantomSplitTunnel
        INFOPLIST_FILE: PhantomSplitTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhantomSplitTunnel/PhantomSplitTunnel.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: 9C5SL5H7CM
        PROVISIONING_PROFILE_SPECIFIER: Phantom-WG Mac SplitTunnel DeveloperID
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: PhantomSplitTunnel/Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PhantomSplitTunnel
        NSSystemExtensionUsageDescription: "Phantom-WG Mac needs to install a system extension to manage per-app traffic routing for Split-Tunneling."
        NetworkExtension:
          NEProviderClasses:
            com.apple.networkextension.app-proxy: $(PRODUCT_MODULE_NAME).TransparentProxyProvider
    entitlements:
      path: PhantomSplitTunnel/PhantomSplitTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - app-proxy-provider-systemextension
        com.apple.security.app-sandbox: true
        # Wildcard claim mirrors the main app and the DNSProxy
        # sibling — see PhantomTunnel comment.
        com.apple.security.application-groups:
          - group.com.remrearas.phantom-wg-macos
          - 9C5SL5H7CM.*
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  # ── DNS Proxy Helper (System Extension) ──────────────────

  PhantomDNSProxy:
    type: system-extension
    platform: macOS
    sources:
      - path: PhantomDNSProxy
        excludes:
          - "**/.DS_Store"
      # App↔extension shared interface — model + Mach service
      # contract + group ID. DNSProxy absorbs the port 53 flows
      # SplitTunnel carves out via excludedNetworkRules.
      - path: Phantom-WG-MacOS/Domain/Configuration/SplitTunnelingConfiguration.swift
      - path: Phantom-WG-MacOS/Domain/IPC/DNSProxyDaemonProtocol.swift
      - path: Phantom-WG-MacOS/Shared/SharedConstants.swift
      # Extension-only shared domain — ring-buffer logger, matching
      # engine, interface watcher.
      - path: Extensions/Domain/Logging/RingBufferLogger.swift
      - path: Extensions/Domain/Matching/FlowDecisionEngine.swift
      - path: Extensions/Domain/Networking/InterfaceMonitor.swift
    dependencies:
      - sdk: NetworkExtension.framework
      - sdk: SystemConfiguration.framework
    settings:
      base:
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        PRODUCT_NAME: com.remrearas.Phantom-WG-MacOS.PhantomDNSProxy
        PRODUCT_MODULE_NAME: PhantomDNSProxy
        PRODUCT_BUNDLE_IDENTIFIER: com.remrearas.Phantom-WG-MacOS.PhantomDNSProxy
        INFOPLIST_FILE: PhantomDNSProxy/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhantomDNSProxy/PhantomDNSProxy.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: 9C5SL5H7CM
        PROVISIONING_PROFILE_SPECIFIER: Phantom-WG Mac DNSProxy DeveloperID
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: PhantomDNSProxy/Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PhantomDNSProxy
        NSSystemExtensionUsageDescription: "Phantom-WG Mac needs to install a system extension that protects Split-Tunneling against DNS leaks."
        NetworkExtension:
          # NEMachServiceName must be prefixed by one of the literal
          # strings in `com.apple.security.application-groups`
          # entitlement (Apple DTS DevForums #654765, #128550).
          # `group.com.remrearas.phantom-wg-macos` is the literal
          # App Group on both the container app and this sysex; the
          # `.dnsproxy` suffix disambiguates from the App Group.
          # NE framework publishes this Mach service to launchd at
          # sysex activation, bridging the user-namespace ↔
          # system-namespace bootstrap split. The constant on the
          # Swift side (`DNSProxyDaemonConfig.machServiceName`)
          # carries the byte-identical string.
          NEMachServiceName: group.com.remrearas.phantom-wg-macos.dnsproxy
          NEProviderClasses:
            com.apple.networkextension.dns-proxy: $(PRODUCT_MODULE_NAME).DNSProxyProvider
    entitlements:
      path: PhantomDNSProxy/PhantomDNSProxy.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - dns-proxy-systemextension
        com.apple.security.app-sandbox: true
        # Two app-groups: the conventional `group.<id>` one for the
        # shared container, plus the TeamID-prefixed wildcard
        # `9C5SL5H7CM.*` that authorizes this sandboxed sysex to
        # register a Mach service whose name starts with the team
        # identifier (per the embedded provisioning profile, which
        # already permits this wildcard). Without the wildcard
        # claim the sysex declares a Mach service in Info.plist
        # that its entitlements aren't authorized for, and OS sysex
        # validation rejects activation with `validationFailed`.
        com.apple.security.application-groups:
          - group.com.remrearas.phantom-wg-macos
          - 9C5SL5H7CM.*
        com.apple.security.network.client: true
        com.apple.security.network.server: true

