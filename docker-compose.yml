# ──────────────────────────────────────────────────────────────────
# phantom-daemon  ·  Production Compose
# ──────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up -d
#   docker compose logs -f daemon
# ──────────────────────────────────────────────────────────────────

services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phantom-daemon
    restart: unless-stopped
    volumes:
      - phantom-sock:/var/run/phantom
      - phantom-data:/var/lib/phantom
    secrets:
      - wg_private_key
      - wg_public_key
    environment:
      - PYTHONUNBUFFERED=1
      - PHANTOM_DB_DIR=/var/lib/phantom
      - WIREGUARD_LISTEN_PORT=51820
      - WIREGUARD_MTU=1420
      - WIREGUARD_ENDPOINT_V4=
      - WIREGUARD_ENDPOINT_V6=
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1

  auth:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - daemon
    volumes:
      - phantom-sock:/var/run/phantom
      - phantom-auth-data:/var/lib/phantom/auth
    secrets:
      - auth_signing_key
      - auth_verify_key
    environment:
      - PHANTOM_DAEMON_SOCKET=/var/run/phantom/daemon.sock
      - AUTH_INACTIVITY_TIMEOUT=1800
    ports:
      - "8443:8443"

secrets:
  wg_private_key:
    file: ./container-data/secrets/production/wg_private_key
  wg_public_key:
    file: ./container-data/secrets/production/wg_public_key
  auth_signing_key:
    file: ./container-data/secrets/production/auth_signing_key
  auth_verify_key:
    file: ./container-data/secrets/production/auth_verify_key

volumes:
  phantom-sock:
  phantom-data:
  phantom-auth-data:
