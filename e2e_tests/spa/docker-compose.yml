# ──────────────────────────────────────────────────────────────────
# SPA E2E test topology
# ──────────────────────────────────────────────────────────────────
# Services:
#   daemon       — phantom-daemon (UDS)
#   auth-service — auth-service (JWT proxy → daemon UDS)
#   nginx        — TLS reverse proxy + SPA static files
#   playwright   — headless browser test runner
#
# All secrets and auth-db are isolated under spa/container-data/
# Generated by: helpers/bootstrap.sh
# ──────────────────────────────────────────────────────────────────

services:
  daemon:
    build:
      context: ../..
      dockerfile: dev.Dockerfile
    command:
      - sh
      - -c
      - |
        mkdir -p /var/lib/phantom/db /var/lib/phantom/state/db /etc/iproute2
        exec python -m phantom_daemon.main /var/run/phantom/daemon.sock
    cap_add: [NET_ADMIN, NET_RAW]
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - daemon-sock:/var/run/phantom
      - ../../phantom_daemon:/app/phantom_daemon:ro
    secrets: [wg_private_key, wg_public_key]
    environment:
      PYTHONUNBUFFERED: "1"
      PHANTOM_DB_DIR: /var/lib/phantom/db
      PHANTOM_STATE_DIR: /var/lib/phantom/state/db
      WIREGUARD_LISTEN_PORT: "51820"
      WIREGUARD_MTU: "1420"
      WIREGUARD_ENDPOINT_V4: "172.31.0.10"
      WIREGUARD_ENDPOINT_V6: "fd00:e2e:1::10"
    networks:
      e2e:
        ipv4_address: 172.31.0.10
        ipv6_address: fd00:e2e:1::10

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    depends_on: [daemon]
    volumes:
      - daemon-sock:/var/run/phantom
      - ../../services/auth-service/auth_service:/app/auth_service:ro
      - ./container-data/auth-db:/var/lib/phantom/auth
    secrets: [auth_signing_key, auth_verify_key]
    environment:
      PYTHONUNBUFFERED: "1"
      AUTH_PROXY_URL: "unix:///var/run/phantom/daemon.sock"
      AUTH_INACTIVITY_TIMEOUT: "1800"
    networks:
      e2e:
        ipv4_address: 172.31.0.15

  nginx:
    image: nginx:alpine
    depends_on: [auth-service]
    volumes:
      - ../../services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../services/react-spa/dist:/usr/share/nginx/html:ro
    secrets: [tls_cert, tls_key]
    networks: [e2e]

  playwright:
    build:
      context: .
      dockerfile: playwright.Dockerfile
    depends_on: [nginx]
    volumes:
      - ./results:/app/results
      - ./report:/app/report
    environment:
      BASE_URL: "https://nginx"
      ADMIN_PASSWORD: ""
    networks: [e2e]

networks:
  e2e:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.31.0.0/24
        - subnet: fd00:e2e:1::/64

secrets:
  wg_private_key:
    file: ./container-data/secrets/wg_private_key
  wg_public_key:
    file: ./container-data/secrets/wg_public_key
  auth_signing_key:
    file: ./container-data/secrets/auth_signing_key
  auth_verify_key:
    file: ./container-data/secrets/auth_verify_key
  tls_cert:
    file: ./container-data/secrets/tls_cert
  tls_key:
    file: ./container-data/secrets/tls_key

volumes:
  daemon-sock:
