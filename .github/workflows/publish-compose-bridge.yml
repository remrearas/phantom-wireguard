name: Publish Compose Bridge

on:
  push:
    tags: ["compose-bridge-v*"]
  workflow_call:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
        type: string
    secrets:
      DEVELOPER_ID_CERTIFICATE_P12:
        required: true
      DEVELOPER_ID_CERTIFICATE_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      APPLE_ID_PASSWORD:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

concurrency:
  group: publish-compose-bridge-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ── 1. Extract version from tag ──────────────────────────────
  extract-version:
    name: Extract version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#compose-bridge-v}"
          fi
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ── 2. Build Linux targets ──────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: extract-version
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            target: build-linux-amd64
          - arch: arm64
            target: build-linux-arm64
            packages: gcc-aarch64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: src/go.mod
          cache: false

      - name: Install cross-compiler
        if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Build
        run: make ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compose_bridge-linux-${{ matrix.arch }}
          path: build/linux-${{ matrix.arch }}/compose_bridge.so
          retention-days: 1

  # ── 3. Build + Sign macOS ───────────────────────────────────
  build-macos:
    name: Build & Sign macOS (arm64)
    runs-on: macos-26
    needs: extract-version
    permissions:
      contents: read
    env:
      TEAM_ID: 9C5SL5H7CM
    steps:
      - name: Setup temp paths
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=ci_ephemeral_${RUN_ID}" >> "$GITHUB_ENV"
          echo "P12_PATH=$RUNNER_TEMP/certificate.p12" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: src/go.mod
          cache: false

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build & Sign
        run: |
          make build-darwin-arm64 \
            CODESIGN_IDENTITY="Developer ID Application"

          echo "--- Verify signature ---"
          codesign -dvv build/darwin-arm64/compose_bridge.dylib

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          ditto -c -k build/darwin-arm64/compose_bridge.dylib \
            "$RUNNER_TEMP/compose_bridge.zip"

          xcrun notarytool submit "$RUNNER_TEMP/compose_bridge.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compose_bridge-darwin-arm64
          path: build/darwin-arm64/compose_bridge.dylib
          retention-days: 1

      - name: Cleanup signing artifacts
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$P12_PATH"

  # ── 4. Package (per-arch zips) ───────────────────────────────
  package:
    name: Package dist
    runs-on: ubuntu-latest
    needs: [extract-version, build-linux, build-macos]
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.extract-version.outputs.version }}
    outputs:
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Assemble per-arch packages
        run: |
          set -euo pipefail

          for PLATFORM in linux-amd64 linux-arm64 darwin-arm64; do
            PKG="staging/compose_bridge"
            rm -rf staging
            mkdir -p "$PKG"

            # Python sources
            cp compose_bridge/__init__.py "$PKG/"
            cp compose_bridge/_ffi.py "$PKG/"
            cp compose_bridge/bridge.py "$PKG/"
            cp compose_bridge/types.py "$PKG/"
            echo "$VERSION" > "$PKG/VERSION"

            # Platform binary
            if [[ "$PLATFORM" == darwin-* ]]; then
              EXT="dylib"
            else
              EXT="so"
            fi
            cp "artifacts/compose_bridge-${PLATFORM}/compose_bridge.${EXT}" \
              "$PKG/compose_bridge-${PLATFORM}.${EXT}"

            # Create zip
            mkdir -p "dist/${VERSION}"
            cd staging
            zip -r "../dist/${VERSION}/compose-bridge-${VERSION}-${PLATFORM}.zip" compose_bridge/
            cd ..
          done

          echo "--- Dist contents ---"
          ls -lh "dist/${VERSION}/"

      - name: Generate directory indexes
        env:
          TZ: Europe/Istanbul
        run: python .github/scripts/generate_directory_indexes.py dist

      - name: Prepare deployment artifact
        id: prepare
        run: |
          ARTIFACT_NAME="compose-bridge-artifacts-$(echo "$GITHUB_SHA" | cut -c1-8)"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: dist/
          retention-days: 7

      - name: Summary
        run: |
          echo "## compose-bridge v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/${VERSION}/*.zip; do
            NAME=$(basename "$f")
            SIZE=$(du -h "$f" | cut -f1)
            echo "| \`${NAME}\` | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          done

  # ── 5. Deploy to Cloudflare Pages ──────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: package
    if: success()
    runs-on: self-hosted
    permissions:
      deployments: write
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.package.outputs.artifact_name }}
          path: deployment/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: compose-bridge-artifacts-phantom
          directory: deployment/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          wranglerVersion: "3"
