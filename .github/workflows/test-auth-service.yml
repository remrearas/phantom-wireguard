name: Test auth-service

on:
  push:
    branches:
      - dev/auth-service

permissions:
  contents: read

jobs:
  test:
    name: Run tests (local + docker)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run local tests (unit + integration)
        run: python -m pytest tests/ -m "not docker and not slow" -v --tb=short

      - name: Create phantom-sock volume
        run: docker volume create phantom-sock

      - name: Build dev image
        run: docker compose -f docker-compose-dev.yml build

      - name: Bootstrap auth service
        run: ./tools/setup.sh

      - name: Start auth service
        run: docker compose -f docker-compose-dev.yml up -d

      - name: Wait for service ready
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8443/auth/me 2>/dev/null || true)
            if [ "$CODE" = "401" ]; then
              echo "Auth service is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Auth service did not start in time"
          docker compose -f docker-compose-dev.yml logs
          exit 1

      - name: Run docker tests (scenario tests)
        run: docker compose -f docker-compose-dev.yml exec -T auth python -m pytest tests/ -v -s -m "docker"

      - name: Auth service logs on failure
        if: failure()
        run: docker compose -f docker-compose-dev.yml logs

      - name: Stop auth service
        if: always()
        run: docker compose -f docker-compose-dev.yml down
