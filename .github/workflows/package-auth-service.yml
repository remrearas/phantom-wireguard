name: Package auth-service

on:
  push:
    tags:
      - 'auth-service-v*'

permissions:
  contents: write

jobs:
  package:
    name: Build and push to dev/daemon
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout auth-service
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: auth-service-src
          persist-credentials: false

      - name: Checkout dev/daemon
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev/daemon
          path: daemon
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#auth-service-v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build package
        working-directory: auth-service-src
        run: python scripts/packager.py --clean

      - name: Sync to dev/daemon
        run: |
          rm -rf daemon/services/auth-service
          mkdir -p daemon/services
          cp -r auth-service-src/dist/phantom-auth daemon/services/auth-service

      - name: Commit and push
        working-directory: daemon
        env:
          AUTH_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/auth-service
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Build: Update auth-service to v${AUTH_VERSION}"
          git push origin dev/daemon

      - name: Summary
        env:
          AUTH_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "## phantom-auth v${AUTH_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find daemon/services/auth-service -type f | wc -l)
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | ${FILE_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | dev/daemon/services/auth-service |" >> "$GITHUB_STEP_SUMMARY"
