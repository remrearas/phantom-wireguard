name: Package auth-service

on:
  push:
    tags:
      - 'auth-service-v*'

permissions:
  contents: read

jobs:
  package:
    name: Build distribution package
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#auth-service-v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build package
        run: python scripts/packager.py --clean --tar

      - name: Upload distribution artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phantom-auth-${{ steps.version.outputs.version }}
          path: dist/phantom-auth/
          retention-days: 90

      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phantom-auth-${{ steps.version.outputs.version }}-archive
          path: dist/phantom-auth.tar.gz
          retention-days: 90

      - name: Summary
        run: |
          echo "## phantom-auth v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          FILE_COUNT=$(find dist/phantom-auth -type f | wc -l)
          ARCHIVE_SIZE=$(du -h dist/phantom-auth.tar.gz | cut -f1)
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files | ${FILE_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Archive | ${ARCHIVE_SIZE} |" >> "$GITHUB_STEP_SUMMARY"
