name: Publish firewall-bridge

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version from __init__.py
        id: extract
        run: |
          VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('firewall_bridge/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*\"(.+?)\"', text)
          print('v' + m.group(1))
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Validate Cargo.toml matches
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PY_VER="${VERSION#v}"
          if [ "$CARGO_VER" != "$PY_VER" ]; then
            echo "Version mismatch: Cargo.toml=${CARGO_VER} __init__.py=${PY_VER}"
            exit 1
          fi
          echo "Versions match: ${PY_VER}"

  test:
    name: Test
    uses: ./.github/workflows/test-firewall-bridge.yml
    permissions:
      contents: read
      actions: read

  build:
    name: Build
    needs: [test]
    uses: ./.github/workflows/build-firewall-bridge.yml
    permissions:
      contents: read

  publish:
    name: Publish to R2
    needs: [version, build]
    runs-on: self-hosted
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: firewall-bridge-linux-amd64
          path: artifacts/linux-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: firewall-bridge-linux-arm64
          path: artifacts/linux-arm64

      - name: Package per-arch zips
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          for ARCH in linux-amd64 linux-arm64; do
            mkdir -p "staging/${ARCH}/firewall_bridge"

            # .so + checksum + header
            cp "artifacts/${ARCH}/libfirewall_bridge_linux.so" "staging/${ARCH}/firewall_bridge/"
            cp "artifacts/${ARCH}/libfirewall_bridge_linux.so.sha256" "staging/${ARCH}/firewall_bridge/"
            cp "artifacts/${ARCH}/firewall_bridge_linux.h" "staging/${ARCH}/firewall_bridge/"

            # Python package
            cp artifacts/${ARCH}/firewall_bridge/*.py "staging/${ARCH}/firewall_bridge/"
            cp -r "artifacts/${ARCH}/firewall_bridge/schemas" "staging/${ARCH}/firewall_bridge/"

            # VERSION
            echo "${VERSION}" > "staging/${ARCH}/firewall_bridge/VERSION"

            # Zip
            cd "staging/${ARCH}"
            zip -r "../../${ARCH}.zip" firewall_bridge/
            cd ../..
          done

          # Standalone VERSION file
          echo "${VERSION}" > VERSION

      - name: Verify checksums
        run: |
          echo "--- linux/amd64 ---"
          cd staging/linux-amd64/firewall_bridge && sha256sum -c libfirewall_bridge_linux.so.sha256 && cd ../../..
          echo "--- linux/arm64 ---"
          cd staging/linux-arm64/firewall_bridge && sha256sum -c libfirewall_bridge_linux.so.sha256 && cd ../../..

      - name: Upload to R2
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          R2_PATH="r2:phantom-vendor/firewall-bridge"

          # Versioned
          rclone copy linux-amd64.zip "${R2_PATH}/${VERSION}/" --progress
          rclone copy linux-arm64.zip "${R2_PATH}/${VERSION}/" --progress
          rclone copy VERSION "${R2_PATH}/${VERSION}/" --progress

          # Latest
          rclone copy linux-amd64.zip "${R2_PATH}/latest/" --progress
          rclone copy linux-arm64.zip "${R2_PATH}/latest/" --progress
          rclone copy VERSION "${R2_PATH}/latest/" --progress

          echo "Published: ${VERSION}"

      - name: Summary
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          AMD64_SHA=$(cut -d' ' -f1 staging/linux-amd64/firewall_bridge/libfirewall_bridge_linux.so.sha256)
          ARM64_SHA=$(cut -d' ' -f1 staging/linux-arm64/firewall_bridge/libfirewall_bridge_linux.so.sha256)
          echo "## firewall-bridge ${VERSION} → R2" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | SHA256 |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| linux/amd64 | \`${AMD64_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| linux/arm64 | \`${ARM64_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Download:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`https://vendor.phantom.tc/firewall-bridge/${VERSION}/linux-amd64.zip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`https://vendor.phantom.tc/firewall-bridge/${VERSION}/linux-arm64.zip\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        run: rm -rf artifacts staging linux-amd64.zip linux-arm64.zip VERSION
