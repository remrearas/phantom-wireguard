name: Phantom-WG Mac - Release

on:
  push:
    tags: [ "mac-v*" ]

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/mac-v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid semver format: $VERSION (expected X.Y or X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-dmg:
    needs: extract-version
    uses: ./.github/workflows/mac-deploy-dmg.yml
    permissions:
      contents: read
    with:
      version: ${{ needs.extract-version.outputs.version }}
    secrets:
      DEVELOPER_ID_CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
      DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      MAC_PROVISIONING_PROFILE_APP: ${{ secrets.MAC_PROVISIONING_PROFILE_APP }}
      MAC_PROVISIONING_PROFILE_EXTENSION: ${{ secrets.MAC_PROVISIONING_PROFILE_EXTENSION }}
      MAC_PROVISIONING_PROFILE_EXTENSION_SPLITTUNNEL: ${{ secrets.MAC_PROVISIONING_PROFILE_EXTENSION_SPLITTUNNEL }}
      MAC_PROVISIONING_PROFILE_EXTENSION_DNSPROXY: ${{ secrets.MAC_PROVISIONING_PROFILE_EXTENSION_DNSPROXY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

  create-release:
    name: Create GitHub Release
    needs: [extract-version, build-dmg]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write

    steps:
      - name: Download arm64 DMG
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: "Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-arm64.dmg"
          path: ${{ runner.temp }}/release

      - name: Download x86_64 DMG
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: "Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-x86_64.dmg"
          path: ${{ runner.temp }}/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          tag_name: "mac-v${{ needs.extract-version.outputs.version }}"
          name: "Phantom-WG Mac ${{ needs.extract-version.outputs.version }}"
          body: |
            ## Phantom-WG Mac ${{ needs.extract-version.outputs.version }}

            ---

            ### 🇺🇸

            #### Downloads

            | Architecture | File |
            |---|---|
            | Apple Silicon (M1/M2/M3/M4) | `Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-arm64.dmg` |
            | Intel | `Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-x86_64.dmg` |

            #### Installation

            1. Download the DMG for your architecture
            2. Drag **Phantom-WG Mac** to the **Applications** folder
            3. On first launch, approve the system extension:
               - **macOS 15+ (Sequoia):** System Settings → General → Login Items & Extensions → Network Extensions
               - **macOS 14 (Sonoma):** System Settings → Privacy & Security → Extensions → Network Extensions
            4. Import your tunnel configuration (.conf) and connect

            #### Requirements

            - macOS 14.0 (Sonoma) or later

            ---

            ### 🇹🇷

            #### İndirmeler

            | Mimari | Dosya |
            |---|---|
            | Apple Silicon (M1/M2/M3/M4) | `Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-arm64.dmg` |
            | Intel | `Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-x86_64.dmg` |

            #### Kurulum

            1. Mimarinize uygun DMG dosyasını indirin
            2. **Phantom-WG Mac** uygulamasını **Applications** klasörüne sürükleyin
            3. İlk çalıştırmada sistem uzantısını onaylayın:
               - **macOS 15+ (Sequoia):** Sistem Ayarları → Genel → Oturum Açma Öğeleri ve Uzantılar → Ağ Uzantıları
               - **macOS 14 (Sonoma):** Sistem Ayarları → Gizlilik ve Güvenlik → Uzantılar → Ağ Uzantıları
            4. Tünel yapılandırmanızı (.conf) içe aktarın ve bağlanın

            #### Gereksinimler

            - macOS 14.0 (Sonoma) veya üzeri

          files: |
            ${{ runner.temp }}/release/Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-arm64.dmg
            ${{ runner.temp }}/release/Phantom-WG-MacOS-${{ needs.extract-version.outputs.version }}-x86_64.dmg
          draft: false
          prerelease: false
          generate_release_notes: false