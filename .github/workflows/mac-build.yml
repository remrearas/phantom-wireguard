name: Phantom-WG Retro - macOS Build Validation

on:
  push:
    branches: [ "retro" ]
    paths:
      - 'tools/client-applications/mac/**'

permissions: {}

jobs:
  build:
    name: Unsigned Build (macOS)
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install Go for WireGuardKit
        working-directory: tools/client-applications/mac
        run: brew install go@1.25

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: tools/client-applications/mac
        run: xcodegen generate

      - name: Build (unsigned)
        working-directory: tools/client-applications/mac
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "Phantom-WG-MacOS" \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty --color
