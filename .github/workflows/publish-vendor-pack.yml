name: Publish vendor-pack

on:
  push:
    tags:
      - 'publish-vendor-pack'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish vendor-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      artifact_name: ${{ steps.prepare.outputs.artifact_name }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout dev/vendor
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev/vendor
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Build vendor-pack
        run: python packager.py

      - name: Push to dev/vendor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add -f dist/
          git commit -m "Vendor-pack updated"
          git push origin dev/vendor

      - name: Generate directory indexes
        env:
          TZ: Europe/Istanbul
        run: python .github/scripts/generate_directory_indexes.py dist

      - name: Prepare deployment artifact
        id: prepare
        run: |
          ARTIFACT_NAME="vendor-artifacts-$(echo "$GITHUB_SHA" | cut -c1-8)"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.prepare.outputs.artifact_name }}
          path: dist/
          retention-days: 7

      - name: Summary
        run: |
          echo "## vendor-pack → dev/vendor" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for zip in dist/*.zip; do
            NAME=$(basename "$zip")
            SIZE=$(du -h "$zip" | cut -f1)
            echo "| \`${NAME}\` | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          done

  deploy:
    name: Deploy to Cloudflare Pages
    needs: publish
    if: success()
    runs-on: self-hosted
    permissions:
      deployments: write
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.publish.outputs.artifact_name }}
          path: deployment/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vendor-artifacts-phantom
          directory: deployment/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          wranglerVersion: '3'