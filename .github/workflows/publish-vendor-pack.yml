name: Publish vendor-pack

on:
  push:
    tags:
      - 'publish-vendor-pack-v*'

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish vendor-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout dev/vendor
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: dev/vendor
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#publish-vendor-pack-}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build vendor-pack
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: python packager.py "${VERSION}"

      - name: Push to dev/vendor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          mkdir -p dist/${VERSION}
          mv dist/vendor-pack-${VERSION}-*.zip dist/${VERSION}/
          git add -f dist/${VERSION}/
          git commit -m "Vendor-pack: ${VERSION}"
          git push origin dev/vendor

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "## vendor-pack ${VERSION} → dev/vendor" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for zip in dist/${VERSION}/*.zip; do
            NAME=$(basename "$zip")
            SIZE=$(du -h "$zip" | cut -f1)
            echo "| ${NAME##*-linux-} | \`${NAME}\` | ${SIZE} |" >> "$GITHUB_STEP_SUMMARY"
          done