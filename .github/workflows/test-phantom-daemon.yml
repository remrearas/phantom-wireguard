name: Test phantom-daemon

on:
  push:
    branches:
      - dev/daemon

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Run pytest (container)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Build dev images
        run: ./tools/dev.sh build

      - name: Generate dev secrets
        run: ./tools/gen-keys-dev.sh

      - name: Bootstrap auth service
        run: ./tools/dev.sh setup-auth

      - name: Generate TLS certificate
        run: ./tools/dev.sh setup-tls

      - name: Prepare SPA dist (placeholder for nginx)
        run: mkdir -p services/react-spa/dist && echo '<!DOCTYPE html><html><body>CI</body></html>' > services/react-spa/dist/index.html

      - name: Start dev stack
        run: ./tools/dev.sh up

      - name: Run tests
        run: ./tools/dev.sh test

      - name: Dev stack logs on failure
        if: failure()
        run: ./tools/dev.sh logs

      - name: Stop dev stack
        if: always()
        run: ./tools/dev.sh down

  e2e-multighost:
    name: E2E — Multighost
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Fetch compose-bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/dev.sh fetch-compose-bridge

      - name: Run E2E tests
        run: ./tools/dev.sh test-multighost-e2e

  e2e-chaos:
    name: E2E — Chaos
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Fetch compose-bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/dev.sh fetch-compose-bridge

      - name: Run E2E tests
        run: ./tools/dev.sh test-chaos-e2e

  e2e-scenario:
    name: E2E — Scenario
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Fetch compose-bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/dev.sh fetch-compose-bridge

      - name: Run E2E tests
        run: ./tools/dev.sh test-scenario-e2e

  e2e-spa:
    name: E2E — SPA
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Fetch compose-bridge
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./tools/dev.sh fetch-compose-bridge

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install SPA dependencies
        run: npm ci
        working-directory: services/react-spa

      - name: Run SPA E2E tests
        run: python e2e_tests/spa/runner.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spa-e2e-results
          path: |
            e2e_tests/spa/results/
            e2e_tests/spa/report/
          retention-days: 14
